<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HyperMemory Graph Visualization</title>
  <style>
    body { margin: 0; background: #1a1a2e; color: #fff; font-family: sans-serif; }
    #controls { padding: 16px; display: flex; gap: 12px; align-items: center; }
    #graph { width: 100vw; height: calc(100vh - 60px); }
    button { background: #333; color: #fff; border: 1px solid #555; padding: 8px 16px; cursor: pointer; border-radius: 4px; }
    button:hover { background: #444; }
    input { background: #222; color: #fff; border: 1px solid #555; padding: 8px 12px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="controls">
    <input id="search" type="text" placeholder="Search nodes..." />
    <button id="btn-2d">2D View</button>
    <button id="btn-3d">3D View</button>
    <button id="btn-fit">Fit View</button>
  </div>
  <div id="graph"></div>
  <script type="module" src="./cosmograph-demo.ts"></script>
</body>
</html>
